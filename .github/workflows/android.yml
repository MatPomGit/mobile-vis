name: Android CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      run_instrumentation_tests:
        description: "Uruchom testy instrumentacyjne (wymaga emulatora)."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-and-lint:
    name: Build debug + lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./android

      - name: Android lint
        run: ./gradlew lintDebug --stacktrace
        working-directory: ./android

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: ./android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  instrumentation-tests:
    name: Optional instrumentation tests
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_instrumentation_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./android

      - name: Run instrumented tests (no emulator provisioning)
        run: ./gradlew connectedDebugAndroidTest --stacktrace
        working-directory: ./android
