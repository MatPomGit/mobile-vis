name: PR-lite VO/Planes Benchmark

on:
  pull_request:
    paths:
      - src/image_analysis/benchmarking.py
      - src/image_analysis/planes.py
      - src/image_analysis/robot_perception.py
      - scripts/benchmark_vo_planes.py
      - benchmarks/vo_planes_pr_lite_baseline.json

permissions:
  contents: read

jobs:
  benchmark-pr-lite:
    name: Run PR-lite benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install OpenCV runtime libraries
        run: |
          # Biblioteki systemowe wymagane przez binarne koła OpenCV podczas importu cv2.
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run PR-lite benchmark checks
        run: |
          python scripts/benchmark_vo_planes.py \
            --scenario-set pr-lite \
            --baseline benchmarks/vo_planes_pr_lite_baseline.json \
            --output benchmarks/vo_planes_pr_lite_latest.json \
            --strict | tee benchmark_pr_lite_metrics.txt

      - name: Add PR-lite benchmark summary
        if: always()
        run: |
          {
            echo "## PR-lite VO/planes benchmark"
            echo ""
            echo "Skrócony benchmark dla zmian w krytycznych modułach VO/planes."
            echo ""
            grep -E "^(VO_|PLANE_|REGRESSION_)" benchmark_pr_lite_metrics.txt \
              | sed 's/^/- `/' \
              | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PR-lite benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-lite-vo-planes-benchmark
          path: |
            benchmark_pr_lite_metrics.txt
            benchmarks/vo_planes_pr_lite_latest.json
