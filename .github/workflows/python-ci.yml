name: Python CI (lint, mypy, pytest)

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    name: python-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies for OpenCV
        run: |
          # Biblioteki wymagane przez import cv2 w środowisku CI.
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check

      - name: Type checking (mypy src)
        run: mypy src

      - name: Tests (pytest with coverage)
        run: pytest --cov=src/image_analysis --cov-report=term-missing
