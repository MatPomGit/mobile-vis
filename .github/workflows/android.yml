name: Android Python-Kotlin Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight Checks
    uses: ./.github/workflows/preflight.yml

  build:
    name: Build APK with Python Support
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Konfiguracja Javy
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 2. Konfiguracja Pythona (wymagana, jeśli Twój proces budowania go wywołuje)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instalacja narzędzi do budowania (opcjonalnie, jeśli używasz skryptów pomocniczych)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python mediapipe

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./android

      # 4. Budowanie APK
      # Gradle automatycznie użyje Chaquopy, aby pobrać OpenCV i MediaPipe dla Androida
      # Debug builds use the default Android debug keystore – no signing secrets needed.
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: ./android

      # --- Release signing (optional – uncomment and configure secrets when needed) ---
      # To enable release builds, add these secrets in GitHub → Settings → Secrets:
      #   KEYSTORE_BASE64       – base64-encoded keystore file
      #   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      #
      # - name: Decode keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
      #
      # - name: Build Release APK
      #   env:
      #     ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.jks
      #     ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      #     ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      #     ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      #   run: ./gradlew assembleRelease --stacktrace
      #   working-directory: ./android

      # 5. Przesłanie APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-ComputerVision-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
