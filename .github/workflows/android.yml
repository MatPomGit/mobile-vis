name: Android Python-Kotlin Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with Python Support
    runs-on: ubuntu-latest

    steps:
     - name: Grant execute permission for gradlew
        # run: chmod +x ./gradlew
        # Jeśli plik jest w podfolderze, użyj:
        run: chmod +x ./android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ./android

      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Konfiguracja Javy
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 2. Konfiguracja Pythona (wymagana, jeśli Twój proces budowania go wywołuje)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Dopasuj do wersji używanej w aplikacji

      # 3. Instalacja narzędzi do budowania (opcjonalnie, jeśli używasz skryptów pomocniczych)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python mediapipe

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Budowanie APK
      # Gradle automatycznie użyje Chaquopy, aby pobrać OpenCV i MediaPipe dla Androida
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. Przesłanie APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-ComputerVision-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
